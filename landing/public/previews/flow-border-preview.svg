<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="baseFlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74d6ff"/>
      <stop offset="38%" stop-color="#bba4ff"/>
      <stop offset="72%" stop-color="#ffd79d"/>
      <stop offset="100%" stop-color="#79e8ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="borderPath" d="M49 49 H589 V309 H49 Z"/>
  </defs>

  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="572" height="292" rx="26" fill="#07111a" stroke="rgba(255,255,255,0.06)"/>

  <use href="#borderPath" fill="none" stroke="url(#baseFlow)" stroke-width="3.4" opacity="0.34" stroke-linecap="round"/>
  <use href="#borderPath" fill="none" stroke="#eaf6ff" stroke-width="1.3" opacity="0.12" stroke-linecap="round"/>

  <g filter="url(#glow)">
    <use href="#borderPath" fill="none" stroke="url(#baseFlow)" stroke-width="4.6" stroke-linecap="round"
      stroke-dasharray="330 1270" opacity="0.92">
      <animate attributeName="stroke-dashoffset" values="0;-1600" dur="4.8s" repeatCount="indefinite"/>
    </use>
    <use href="#borderPath" fill="none" stroke="url(#baseFlow)" stroke-width="4.2" stroke-linecap="round"
      stroke-dasharray="330 1270" stroke-dashoffset="-800" opacity="0.88">
      <animate attributeName="stroke-dashoffset" values="-800;-2400" dur="4.8s" repeatCount="indefinite"/>
    </use>
  </g>

  <use href="#borderPath" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round"
    stroke-dasharray="60 1540" opacity="0.34">
    <animate attributeName="stroke-dashoffset" values="-120;-1720" dur="4.8s" repeatCount="indefinite"/>
  </use>
  <use href="#borderPath" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round"
    stroke-dasharray="60 1540" stroke-dashoffset="-920" opacity="0.28">
    <animate attributeName="stroke-dashoffset" values="-920;-2520" dur="4.8s" repeatCount="indefinite"/>
  </use>
</svg>
