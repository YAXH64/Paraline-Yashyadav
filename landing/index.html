<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000c19" />
  <meta name="description" content="Paraline is an audio-reactive edge visualizer for Windows desktops. Make Windows feel ambient with a desktop audio visualizer that dances to your music." />
  <title>Paraline - Desktop Audio Visualizer for Windows</title>
</head>
<body style="margin: 0; background-color: #000c19;">

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>


  <button id="scrollToTopBtn" title="Go to top" aria-label="Scroll to top" style="
    display: none !important; 
    position: fixed !important; 
    bottom: 25px !important;    
    right: 25px !important;       
    z-index: 999999 !important;  
    width: 44px !important;       
    height: 44px !important;      
    border: 1px solid rgba(255, 255, 255, 0.1) !important; 
    outline: none !important;
    background: rgba(13, 27, 42, 0.6) !important; /* Premium dark translucent layout */
    backdrop-filter: blur(10px) !important;       /* Frosted glass layout backdrop blur */
    -webkit-backdrop-filter: blur(10px) !important;
    color: rgba(255, 255, 255, 0.5) !important;   /* Muted subtle arrow icon color */
    border-radius: 50% !important;
    cursor: pointer !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 10px rgba(110, 142, 251, 0.1) !important; /* Soft ambient glow shadow */
    align-items: center !important;
    justify-content: center !important;
    opacity: 0 !important;
    transition: opacity 0.3s ease, transform 0.3s ease, background 0.3s ease, color 0.3s ease !important;
  ">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script>
  (() => {
    const btn = document.getElementById("scrollToTopBtn");
    if (!btn) return;

    // Fluid Hover Feedback Animations
    btn.addEventListener("mouseenter", () => {
      btn.style.setProperty("background", "rgba(13, 27, 42, 0.95)", "important");
      btn.style.setProperty("color", "#ffffff", "important");
      btn.style.setProperty("transform", "translateY(-3px)", "important");
      btn.style.setProperty("border", "1px solid rgba(110, 142, 251, 0.4)", "important");
    });
    
    btn.addEventListener("mouseleave", () => {
      btn.style.setProperty("background", "rgba(13, 27, 42, 0.6)", "important");
      btn.style.setProperty("color", "rgba(255, 255, 255, 0.5)", "important");
      btn.style.setProperty("transform", "translateY(0)", "important");
      btn.style.setProperty("border", "1px solid rgba(255, 255, 255, 0.1)", "important");
    });

    // Detect layout scroll wrapper metrics across window/containers
    const forceCheck = () => {
      let hasScrolled = window.scrollY > 200 || document.documentElement.scrollTop > 200 || document.body.scrollTop > 200;
      
      if (!hasScrolled) {
        const customPanels = document.querySelectorAll("div, main, section");
        for (let panel of customPanels) {
          if (panel.scrollTop > 200) {
            hasScrolled = true;
            break;
          }
        }
      }

      if (hasScrolled) {
        btn.style.setProperty("display", "flex", "important");
        btn.style.setProperty("opacity", "1", "important");
      } else {
        btn.style.setProperty("opacity", "0", "important");
        setTimeout(() => {
          if (btn.style.opacity === "0") btn.style.setProperty("display", "none", "important");
        }, 300);
      }
    };

    window.addEventListener("scroll", forceCheck, true);

    // Click handler execution loop to reset view layers smoothly
    btn.addEventListener("click", () => {
      const scrollOptions = { top: 0, behavior: "smooth" };
      
      window.scrollTo(scrollOptions);
      document.documentElement.scrollTo(scrollOptions);
      document.body.scrollTo(scrollOptions);

      document.querySelectorAll("div, main, section").forEach(el => {
        if (el.scrollTop > 0) el.scrollTo(scrollOptions);
      });
    });
  })();
  </script>
</body>
</html>
