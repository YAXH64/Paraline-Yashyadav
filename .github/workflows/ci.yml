name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-helper:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm install

      - name: Build audio helper
        run: npm run build:helper

  build-landing:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install landing dependencies
        run: npm --prefix landing install

      - name: Build landing assets
        run: npm --prefix landing run build

  package-app:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm install

      - name: Build audio helper
        run: npm run build:helper

      - name: Package Windows app (dir only)
        run: npm run pack:win