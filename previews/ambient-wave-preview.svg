<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="572" height="292" rx="26" fill="#07111a" stroke="rgba(255,255,255,0.06)"/>

  <path d="M58 82 C132 62 186 94 252 78 S392 56 468 76 S554 90 582 74" fill="none" stroke="#8fd8ff" stroke-width="3.2" opacity="0.72" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 5;0 0" dur="4.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.62;0.88;0.62" dur="3.6s" repeatCount="indefinite"/>
  </path>
  <path d="M58 96 C126 82 198 108 266 94 S398 78 474 94 S548 104 582 92" fill="none" stroke="#7bc8f8" stroke-width="1.6" opacity="0.28" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 3;0 0" dur="3.8s" repeatCount="indefinite"/>
  </path>

  <path d="M58 282 C132 300 214 250 286 278 S426 308 582 286" fill="none" stroke="#d8f5ff" stroke-width="3.4" opacity="0.74" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.92;0.6" dur="3.2s" repeatCount="indefinite"/>
  </path>
  <path d="M58 268 C134 282 214 238 286 262 S434 288 582 270" fill="none" stroke="#8fd8ff" stroke-width="1.8" opacity="0.22" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="3.6s" repeatCount="indefinite"/>
  </path>
</svg>
